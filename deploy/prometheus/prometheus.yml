# Prometheus configuration for MongeBot monitoring
# Scrapes metrics from /metrics endpoint and evaluates alert rules.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'mongebot'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'localhost:9093'

rule_files:
  - 'alert_rules.yml'

scrape_configs:
  # MongeBot metrics
  - job_name: 'mongebot'
    static_configs:
      - targets:
          - 'localhost:9800'
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'

  # Optional: Node exporter for host metrics
  # - job_name: 'node'
  #   static_configs:
  #     - targets:
  #         - 'localhost:9100'
