run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - goconst
    - gocritic
    - gofmt
    - gosec
    - misspell
    - nilerr
    - prealloc
    - predeclared
    - revive
    - unconvert
    - unparam
    - wastedassign

linters-settings:
  govet:
    shadow: true

  goconst:
    min-len: 3
    min-occurrences: 3

  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style

  gosec:
    excludes:
      - G104 # Unhandled errors (too noisy for logging calls)
      - G304 # File path from variable (intentional for config loading)

  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: exported
        disabled: true # We have internal packages
      - name: increment-decrement
      - name: var-naming
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf

  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-rules:
    # Test files can have longer functions and unused params
    - path: _test\.go
      linters:
        - goconst
        - gosec
        - unparam
        - errcheck

    # Main entry points can have longer functions
    - path: cmd/
      linters:
        - goconst

  max-issues-per-linter: 50
  max-same-issues: 5
